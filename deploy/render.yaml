services:
  - type: web
    name: mastyf-ai
    runtime: node
    repo: https://github.com/mastyf-ai/mastyf-ai
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node deploy/render-start.js
    buildFilter:
      paths:
        - src/**/*.ts
        - packages/**/*.ts
        - package.json
        - tsconfig.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: MASTYF_AI_DB_PATH
        value: /tmp/mastyf-ai.db