# Local staging stack for enterprise pilot (Postgres + Redis).
# Usage:
#   docker compose -f deploy/docker-compose.staging.yml up -d
#   export DATABASE_URL=postgresql://guardian:guardian@127.0.0.1:5432/guardian
#   export REDIS_URL=redis://127.0.0.1:6379
#   ./scripts/staging-apply-migrations.sh
#   env -u DASHBOARD_AUTH_DISABLED pnpm enterprise:preflight

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardian
      POSTGRES_PASSWORD: guardian
      POSTGRES_DB: guardian
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardian"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
