name: Supply Chain Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  audit-and-build:
    name: Audit, Build, Test, SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: npm Audit (High/Critical only)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test

      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --omit dev

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

      - name: Verify SBOM Exists
        run: test -f sbom.cdx.json && echo "SBOM generated successfully"