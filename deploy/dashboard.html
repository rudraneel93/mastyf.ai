<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Guardian Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 4px; color: #58a6ff; }
h2 { font-size: 16px; color: #8b949e; margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.card h3 { font-size: 14px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric { font-size: 32px; font-weight: 700; color: #f0f6fc; }
.metric.green { color: #3fb950; }
.metric.red { color: #f85149; }
.metric.yellow { color: #d29922; }
.panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.panel h3 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
th { color: #8b949e; font-weight: 600; }
td { color: #c9d1d9; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.pass { background: #1b3821; color: #3fb950; }
.badge.block { background: #3d1f1f; color: #f85149; }
.badge.flag { background: #3d3520; color: #d29922; }
textarea { width: 100%; min-height: 300px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; resize: vertical; }
button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; margin-right: 8px; }
button:hover { background: #2ea043; }
.status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.connected { background: #3fb950; animation: pulse 2s infinite; }
.status-dot.disconnected { background: #f85149; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #30363d; }
.tab { padding: 8px 16px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 14px; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>
<h1>🛡️ MCP Guardian Dashboard</h1>
<h2>Security, cost, and health monitoring for MCP infrastructure</h2>

<div class="status">
  <span class="status-dot connected" id="statusDot"></span>
  <span id="statusText">Connecting...</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('policy')">Policy Editor</div>
  <div class="tab" onclick="showTab('metrics')">Raw Metrics</div>
</div>

<div id="overview" class="tab-content active">
  <div class="grid" id="metricsGrid"></div>
  <div class="panel">
    <h3>Per-Server Status</h3>
    <div id="perServer"></div>
  </div>
</div>

<div id="policy" class="tab-content">
  <div class="panel">
    <h3>Active Policy</h3>
    <div id="policyInfo" style="margin-bottom: 12px; font-size: 14px; color: #c9d1d9;"></div>
    <textarea id="policyEditor" readonly></textarea>
    <div style="margin-top: 12px;">
      <button onclick="reloadPolicy()">Reload Policy</button>
      <span style="font-size: 12px; color: #8b949e; margin-left: 8px;" id="policyStatus"></span>
    </div>
  </div>
</div>

<div id="metrics" class="tab-content">
  <div class="panel">
    <h3>Prometheus /metrics (Raw)</h3>
    <pre id="rawMetrics" style="font-size: 11px; color: #8b949e; max-height: 500px; overflow: auto; background: #0d1117; padding: 12px; border-radius: 6px;"></pre>
  </div>
</div>

<script>
let currentData = { policy: null, metrics: null, servers: [] };

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

function parsePrometheusMetrics(text) {
  const result = { servers: {}, global: {} };
  const lines = text.split('\n');
  for (const line of lines) {
    if (line.startsWith('#') || !line.trim()) continue;
    const match = line.match(/^(\w+)\{([^}]*)\}\s+(.+)$/);
    if (match) {
      const name = match[1];
      const labelsStr = match[2];
      const value = parseFloat(match[3]);
      const labels = {};
      labelsStr.split(',').forEach(l => {
        const [k, v] = l.split('=');
        labels[k.trim()] = (v || '').replace(/"/g, '');
      });
      const srv = labels.server_name || 'global';
      if (!result.servers[srv]) result.servers[srv] = {};
      result.servers[srv][name] = (result.servers[srv][name] || 0) + (isNaN(value) ? 0 : value);
    } else if (line.match(/^(\w+)\s+(.+)$/)) {
      const m = line.match(/^(\w+)\s+(.+)$/);
      if (m && !m[1].startsWith('mcp_guardian_')) continue;
      if (m) result.global[m[1]] = parseFloat(m[2]);
    }
  }
  return result;
}

async function updateDashboard() {
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Fetch live data
  let policyData = null;
  try {
    const res = await fetch('/api/policy');
    if (res.ok) policyData = await res.json();
  } catch(e) {}

  let metricsText = null;
  try {
    const res = await fetch('/metrics');
    if (res.ok) metricsText = await res.text();
  } catch(e) {}

  // Parse metrics
  let parsedMetrics = { servers: {}, global: {} };
  if (metricsText && !metricsText.startsWith('{')) {
    parsedMetrics = parsePrometheusMetrics(metricsText);
    document.getElementById('rawMetrics').textContent = metricsText;
  }

  // Update status
  if (metricsText && !metricsText.startsWith('{')) {
    dot.className = 'status-dot connected';
    const serverCount = Object.keys(parsedMetrics.servers).filter(s => s !== 'global' && parsedMetrics.servers[s].mcp_guardian_requests_total > 0).length;
    statusText.textContent = `Proxy Active | ${serverCount} MCP Server(s) | Policy: ${policyData ? policyData.mode : 'none'}`;
  } else {
    dot.className = 'status-dot disconnected';
    statusText.textContent = 'Waiting for metrics...';
  }

  // Build metrics grid
  let passCount = 0, blockCount = 0, flagCount = 0;
  for (const [srv, m] of Object.entries(parsedMetrics.servers)) {
    if (srv === 'global') continue;
    // We don't have per-decision counters separately in parsed format
    // Use the total requests
    passCount += (m.mcp_guardian_requests_total || 0);
  }
  // Block count from blocked requests counter
  for (const [srv, m] of Object.entries(parsedMetrics.servers)) {
    if (srv === 'global') continue;
    blockCount += (m.mcp_guardian_blocked_requests_total || 0);
  }

  document.getElementById('metricsGrid').innerHTML = `
    <div class="card"><h3>Requests (Total)</h3><div class="metric green">${passCount.toLocaleString()}</div></div>
    <div class="card"><h3>Blocked Requests</h3><div class="metric red">${blockCount.toLocaleString()}</div></div>
    <div class="card"><h3>Active Sessions</h3><div class="metric green">${parsedMetrics.global.mcp_guardian_active_sessions || 0}</div></div>
    <div class="card"><h3>Policy Mode</h3><div class="metric" style="color:#d29922;">${policyData ? policyData.mode.toUpperCase() : 'NONE'}</div></div>
  `;

  // Build per-server table
  let serverRows = '';
  const srvs = Object.keys(parsedMetrics.servers).filter(s => s !== 'global');
  if (srvs.length === 0) {
    serverRows = '<tr><td colspan="4" style="color:#8b949e;">No MCP server data yet. Send some tools/call traffic through the proxy.</td></tr>';
  } else {
    for (const srv of srvs) {
      const m = parsedMetrics.servers[srv];
      const cbState = m.mcp_guardian_circuit_breaker_state;
      const cbLabel = cbState === 0 ? 'CLOSED' : cbState === 1 ? 'OPEN' : 'HALF_OPEN';
      const cbClass = cbState === 0 ? 'pass' : cbState === 1 ? 'block' : 'flag';
      serverRows += `<tr>
        <td>${srv}</td>
        <td>${m.mcp_guardian_requests_total > 0 ? '<span class="badge pass">Active</span>' : '<span class="badge">Idle</span>'}</td>
        <td>${m.mcp_guardian_requests_total || 0} calls</td>
        <td><span class="badge badge-${cbClass}">${cbLabel}</span></td>
        <td>${m.mcp_guardian_blocked_requests_total || 0} blocked</td>
      </tr>`;
    }
  }

  document.getElementById('perServer').innerHTML = `<table>
    <thead><tr><th>Server</th><th>Status</th><th>Total Calls</th><th>Circuit Breaker</th><th>Blocked</th></tr></thead>
    <tbody>${serverRows}</tbody>
  </table>`;

  // Update policy tab
  if (policyData) {
    document.getElementById('policyInfo').innerHTML = `<strong>Mode:</strong> <span style="color:#d29922;">${policyData.mode.toUpperCase()}</span> | <strong>Status:</strong> <span style="color:#3fb950;">Active</span>`;
    document.getElementById('policyEditor').value = JSON.stringify(policyData, null, 2);
    document.getElementById('policyStatus').textContent = '';
  } else {
    document.getElementById('policyInfo').textContent = 'No policy loaded. Start proxy with --policy flag.';
    document.getElementById('policyEditor').value = '# No policy loaded\n# Run: mcp-guardian proxy --policy ./default-policy.yaml';
  }
}

async function reloadPolicy() {
  try {
    const res = await fetch('/api/policy/reload', { method: 'POST' });
    if (res.ok) {
      document.getElementById('policyStatus').textContent = '✅ Policy reloaded successfully';
      setTimeout(updateDashboard, 500);
    } else {
      document.getElementById('policyStatus').textContent = '❌ Failed to reload';
    }
  } catch {
    document.getElementById('policyStatus').textContent = '❌ API endpoint not available';
  }
}

updateDashboard();
setInterval(updateDashboard, 5000);
</script>
</body>
</html>
