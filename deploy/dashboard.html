<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Guardian Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 4px; color: #58a6ff; }
h2 { font-size: 16px; color: #8b949e; margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.card h3 { font-size: 14px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric { font-size: 32px; font-weight: 700; color: #f0f6fc; }
.metric.green { color: #3fb950; }
.metric.red { color: #f85149; }
.metric.yellow { color: #d29922; }
.panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.panel h3 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
th { color: #8b949e; font-weight: 600; }
td { color: #c9d1d9; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.pass { background: #1b3821; color: #3fb950; }
.badge.block { background: #3d1f1f; color: #f85149; }
.badge.flag { background: #3d3520; color: #d29922; }
.badge.cb-closed { background: #1b3821; color: #3fb950; }
.badge.cb-open { background: #3d1f1f; color: #f85149; }
.badge.cb-half { background: #3d3520; color: #d29922; }
textarea { width: 100%; min-height: 300px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; resize: vertical; }
button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; margin-right: 8px; }
button:hover { background: #2ea043; }
button.secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
button.secondary:hover { background: #30363d; }
.status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.connected { background: #3fb950; animation: pulse 2s infinite; }
.status-dot.disconnected { background: #f85149; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #30363d; }
.tab { padding: 8px 16px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 14px; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>
<h1>🛡️ MCP Guardian Dashboard</h1>
<h2>Security, cost, and health monitoring for MCP infrastructure</h2>

<div class="status">
  <span class="status-dot connected" id="statusDot"></span>
  <span id="statusText">Connected</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('policy')">Policy Editor</div>
  <div class="tab" onclick="showTab('servers')">Servers</div>
</div>

<div id="overview" class="tab-content active">
  <div class="grid" id="metricsGrid"></div>
  <div class="panel">
    <h3>Recent Activity</h3>
    <div id="recentLogs" style="max-height: 400px; overflow-y: auto; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: #8b949e;"></div>
  </div>
</div>

<div id="policy" class="tab-content">
  <div class="panel">
    <h3>Active Policy</h3>
    <textarea id="policyEditor" readonly></textarea>
    <div style="margin-top: 12px;">
      <button onclick="reloadPolicy()">Reload Policy</button>
      <span style="font-size: 12px; color: #8b949e; margin-left: 8px;" id="policyStatus"></span>
    </div>
  </div>
</div>

<div id="servers" class="tab-content">
  <div class="panel">
    <h3>MCP Servers</h3>
    <table id="serversTable">
      <thead><tr><th>Server</th><th>Status</th><th>Latency</th><th>Tools</th><th>Circuit Breaker</th><th>Calls Today</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

async function fetchMetrics() {
  try {
    const res = await fetch('/metrics');
    if (!res.ok) throw new Error('Metrics endpoint not available');
    return await res.text();
  } catch {
    return null;
  }
}

async function fetchLogs() {
  try {
    const res = await fetch('/api/logs');
    if (!res.ok) throw new Error('Logs endpoint not available');
    return await res.json();
  } catch {
    return [];
  }
}

async function fetchPolicy() {
  try {
    const res = await fetch('/api/policy');
    if (!res.ok) throw new Error('Policy endpoint not available');
    return await res.json();
  } catch {
    return null;
  }
}

async function reloadPolicy() {
  try {
    const res = await fetch('/api/policy/reload', { method: 'POST' });
    if (res.ok) {
      document.getElementById('policyStatus').textContent = '✅ Policy reloaded successfully';
      updateDashboard();
    } else {
      document.getElementById('policyStatus').textContent = '❌ Failed to reload policy';
    }
  } catch {
    document.getElementById('policyStatus').textContent = '❌ API endpoint not available';
  }
}

async function updateDashboard() {
  // Update status
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Mock metrics for demo (in production, parse Prometheus /metrics)
  const metrics = {
    requests_total_pass: 1247,
    requests_total_block: 23,
    requests_total_flag: 8,
    active_sessions: 12,
    circuit_breaker_state: 0,
  };

  dot.className = 'status-dot connected';
  statusText.textContent = 'Proxy Active | 3 MCP Servers';

  document.getElementById('metricsGrid').innerHTML = `
    <div class="card"><h3>Requests (Pass)</h3><div class="metric green">${metrics.requests_total_pass.toLocaleString()}</div></div>
    <div class="card"><h3>Requests (Blocked)</h3><div class="metric red">${metrics.requests_total_block}</div></div>
    <div class="card"><h3>Requests (Flagged)</h3><div class="metric yellow">${metrics.requests_total_flag}</div></div>
    <div class="card"><h3>Active Sessions</h3><div class="metric green">${metrics.active_sessions}</div></div>
    <div class="card"><h3>Circuit Breaker</h3><div class="metric green">CLOSED</div></div>
    <div class="card"><h3>Policy Mode</h3><div class="metric" style="color:#d29922;">BLOCK</div></div>
  `;

  document.getElementById('recentLogs').innerHTML = `
    <div style="color:#3fb950;">[13:22:01] PASS — search (filesystem) — 34 tokens — agent: ai-assistant</div>
    <div style="color:#3fb950;">[13:22:01] PASS — read_file (github) — 66 tokens — agent: ai-assistant</div>
    <div style="color:#f85149;">[13:21:58] BLOCK — execute_command (filesystem) — policy: deny-dangerous-tools</div>
    <div style="color:#3fb950;">[13:21:55] PASS — list_directory (puppeteer) — 45 tokens — agent: ai-assistant</div>
    <div style="color:#d29922;">[13:21:52] FLAG — search (github) — rate limit exceeded: 121/120 cpm</div>
    <div style="color:#3fb950;">[13:21:49] PASS — read_file (filesystem) — 55 tokens — agent: admin-bot</div>
    <div style="color:#3fb950;">[13:21:46] PASS — echo (echo-server) — 21 tokens — agent: test-agent</div>
    <div style="color:#f85149;">[13:21:40] BLOCK — eval (puppeteer) — policy: deny-eval</div>
  `;

  // Update servers table
  document.querySelector('#serversTable tbody').innerHTML = `
    <tr><td>github-server</td><td><span class="badge pass">Pass</span></td><td>902ms</td><td>26</td><td><span class="badge cb-closed">CLOSED</span></td><td>847</td></tr>
    <tr><td>filesystem-server</td><td><span class="badge pass">Pass</span></td><td>1253ms</td><td>14</td><td><span class="badge cb-closed">CLOSED</span></td><td>312</td></tr>
    <tr><td>puppeteer-server</td><td><span class="badge pass">Pass</span></td><td>1275ms</td><td>7</td><td><span class="badge cb-closed">CLOSED</span></td><td>88</td></tr>
  `;

  // Load policy
  const policy = await fetchPolicy();
  if (policy) {
    document.getElementById('policyEditor').value = JSON.stringify(policy, null, 2);
  } else {
    document.getElementById('policyEditor').value = '# Policy endpoint not available\n# Enable with: --policy ./default-policy.yaml';
  }
}

updateDashboard();
setInterval(updateDashboard, 30000);
</script>
</body>
</html>
