replicaCount: 2

image:
  repository: ghcr.io/rudraneel93/mcp-guardian
  tag: latest
  pullPolicy: Always

proxy:
  config:
    policy: |-
      rules:
        - name: block-dangerous
          type: tool_denylist
          tools: ["run_shell", "execute_command", "bash", "eval"]
        - name: block-injection
          type: regex
          pattern: "rm\\s+-rf|curl\\s|\\$\\(|`[^`]+`"
    mcpConfigPath: /etc/mcp-guardian/cline_mcp_settings.json

persistence:
  enabled: true
  storageClass: standard
  size: 1Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  port: 4000

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

dashboard:
  enabled: true
  authEnabled: true