replicaCount: 1

image:
  repository: ghcr.io/rudraneel93/mcp-guardian
  tag: latest
  pullPolicy: IfNotPresent

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

serviceAccount:
  create: true
  annotations: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

config:
  mcpConfigPath: /etc/mcp-guardian/mcp.json
  policy:
    path: /etc/mcp-guardian/policy.yaml
    mode: block
  env:
    NODE_ENV: production
    DASHBOARD_ENABLED: "true"
    METRICS_ENABLED: "true"
    GUARDIAN_STRICT_MODE: "true"
    POLICY_AUDIT_ENABLED: "true"
    GUARDIAN_SECRET_PROVIDER: env

persistence:
  enabled: true
  storageClass: standard
  size: 1Gi
  mountPath: /data

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  port: 4000
  metricsPort: 9090
  annotations: {}

dashboard:
  enabled: true
  authEnabled: false
  allowedCidr: ""

metrics:
  enabled: true
  port: 9090

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

externalSecrets:
  enabled: false
  secretStore: vault-backend
  path: mcp-guardian/prod

networkPolicy:
  enabled: false
  allowedNamespace: default

secrets:
  mode: external
  existingSecret: ""

database:
  type: sqlite
  url: ""

livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
affinity: {}
tolerations: []

backup:
  enabled: false
  schedule: "0 2 * * *"
