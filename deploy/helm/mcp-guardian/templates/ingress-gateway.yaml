{{- if and .Values.gateway.enabled .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mcp-guardian.fullname" . }}-gateway
  labels:
    {{- include "mcp-guardian.labels" . | nindent 4 }}
  {{- with .Values.gateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.gateway.ingress.host | quote }}
      secretName: {{ .Values.gateway.ingress.tlsSecret | default (printf "%s-gateway-tls" (include "mcp-guardian.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /sse
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-guardian.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
          - path: /message
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-guardian.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
{{- end }}
