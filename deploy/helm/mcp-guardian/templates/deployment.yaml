apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-guardian.fullname" . }}
  labels:
    {{- include "mcp-guardian.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "mcp-guardian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-guardian.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: {{ include "mcp-guardian.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mcp-guardian
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - dist/cli.js
            - proxy
            - --config
            - {{ .Values.config.mcpConfigPath }}
            - --policy
            - {{ .Values.config.policy.path }}
            - --blocking-mode
            - {{ .Values.config.policy.mode }}
          env:
            - name: REPLICA_COUNT
              value: {{ .Values.replicaCount | quote }}
            - name: MCP_GUARDIAN_DB_PATH
              value: {{ .Values.persistence.mountPath }}/history.db
            {{- if eq .Values.database.type "postgres" }}
            - name: DB_TYPE
              value: postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secret" (include "mcp-guardian.fullname" .)) }}
                  key: database-url
                  optional: true
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: redis://{{ .Release.Name }}-redis-master:6379
            {{- else if .Values.secrets.existingSecret }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: redis-url
                  optional: true
            {{- end }}
            {{- range $key, $val := .Values.config.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if or .Values.externalSecrets.enabled .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (printf "%s-secret" (include "mcp-guardian.fullname" .)) }}
                optional: true
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/mcp-guardian
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-guardian.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mcp-guardian.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
