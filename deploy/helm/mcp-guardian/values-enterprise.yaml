# Enterprise production overlay — use with:
#   helm upgrade --install mcp-guardian ./deploy/helm/mcp-guardian \
#     -f deploy/helm/mcp-guardian/values.yaml \
#     -f deploy/helm/mcp-guardian/values-enterprise.yaml
#
# See docs/ENTERPRISE_DEPLOY.md and README Production Checklist.

replicaCount: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

redis:
  enabled: true
  sentinel:
    external: true
    # Example: host:26379,host:26379 — set per cluster
    sentinels: ""
    masterName: mymaster

config:
  policy:
    mode: block
  env:
    NODE_ENV: production
    DASHBOARD_ENABLED: "true"
    DASHBOARD_AUTH_DISABLED: "false"
    METRICS_ENABLED: "true"
    GUARDIAN_STRICT_MODE: "true"
    GUARDIAN_REQUIRE_PGBOUNCER: "true"
    GUARDIAN_MULTI_TENANT_ENABLED: "true"
    GUARDIAN_AI_AUTO_APPLY: "false"
    POLICY_AUDIT_ENABLED: "true"
    GUARDIAN_ENCODING_GUARD: "true"
    GUARDIAN_HTTP_TOOLS_POLICY: "true"
database:
  type: postgres
  # Route through PgBouncer (transaction mode), port 6432 — NOT postgres:5432
  url: ""

pgbouncer:
  enabled: true
  requireGuardianEnforcement: true
  poolMaxPerReplica: 4

postgres:
  maxConnections: 300

dashboard:
  enabled: true
  authEnabled: true
  allowedCidr: ""

dpop:
  require: true

multiTenant:
  enabled: true

# Optional MCP Guardian Cloud control plane (policy sync / SSO — no license paywall)
controlPlane:
  url: ""  # e.g. https://cloud.example.com
  # licenseKey: optional gcp_... API key from cloud Settings
  licenseKey: ""

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s

networkPolicy:
  enabled: true

mtls:
  enabled: false
  # Set existingSecret when upstream MCP requires client certs

backup:
  enabled: true
  schedule: "0 2 * * *"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
