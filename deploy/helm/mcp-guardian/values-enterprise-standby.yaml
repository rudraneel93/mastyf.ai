# Standby region overlay — use with primary values-enterprise.yaml
#   helm upgrade --install mcp-guardian ./deploy/helm/mcp-guardian \
#     -f deploy/helm/mcp-guardian/values.yaml \
#     -f deploy/helm/mcp-guardian/values-enterprise.yaml \
#     -f deploy/helm/mcp-guardian/values-enterprise-standby.yaml

replicaCount: 2

config:
  env:
    GUARDIAN_REGION: "eu-west-1"
    GUARDIAN_MULTI_REGION_MODE: "active-active"
    # Dashboard-only pods may use read-replica DATABASE_URL (set per cluster)
    GUARDIAN_DASHBOARD_DATA_SOURCE: "unified"

gateway:
  ingress:
    host: guardian-standby.example.com

# Point at cross-region shared Redis for DPoP jti + optional global rate cap
# config.env.GUARDIAN_DPOP_REDIS_URL: "rediss://global-redis.example.com:6379"
# config.env.GUARDIAN_GLOBAL_RATE_LIMIT_REDIS_URL: "rediss://global-redis.example.com:6379"
# config.env.GUARDIAN_GLOBAL_RATE_LIMIT_MAX: "10000"
