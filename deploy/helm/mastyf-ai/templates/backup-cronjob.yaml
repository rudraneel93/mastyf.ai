{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mastyf-ai.fullname" . }}-backup
  labels:
    {{- include "mastyf-ai.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["/bin/sh", "-c"]
              args:
                - cp {{ .Values.persistence.mountPath }}/history.db /backup/history-$(date +%Y%m%d).db
              volumeMounts:
                - name: data
                  mountPath: {{ .Values.persistence.mountPath }}
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "mastyf-ai.fullname" . }}-data
            - name: backup
              persistentVolumeClaim:
                claimName: {{ include "mastyf-ai.fullname" . }}-backup
{{- end }}
