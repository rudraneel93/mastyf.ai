{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mastyf-ai.fullname" . }}-gateway
  labels:
    {{- include "mastyf-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: gateway
      protocol: TCP
      name: mcp-sse
    {{- if .Values.gateway.websocketPort }}
    - port: {{ .Values.gateway.websocketPort }}
      targetPort: gateway-ws
      protocol: TCP
      name: mcp-ws
    {{- end }}
  selector:
    {{- include "mastyf-ai.selectorLabels" . | nindent 4 }}
{{- end }}
